<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💖 My Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

/* SAFE CINEMATIC PINK + PURPLE BACKGROUND */
html, body{
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  overflow:hidden;
}

body{
  font-family:'Poppins', sans-serif;
  color:white;

  background: linear-gradient(-45deg,
    #ff4d6d,
    #ff006e,
    #7b2ff7,
    #c445ff,
    #ff85a1);

  background-size: 400% 400%;
  animation: bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* SCREEN SYSTEM */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  opacity:0;
  transform:scale(1.1);
  transition:1s ease;
  pointer-events:none;
}

.screen.active{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

/* BUTTON */
button{
  padding:14px 25px;
  border:none;
  border-radius:25px;
  background:#ff1493;
  color:white;
  margin-top:20px;
  cursor:pointer;
}

/* INPUT */
input{
  padding:10px;
  border-radius:10px;
  border:none;
  text-align:center;
}

/* BIG PHOTO */
.photo{
  width:90%;
  max-width:380px;
  height:240px;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 0 30px #ff1493;
}

/* LETTER */
#letter{
  width:85%;
  font-size:14px;
  line-height:1.6;
}

/* CHAT UI */
.chat{
  width:320px;
  background:#0b141a;
  padding:10px;
  border-radius:15px;
}

.msg{
  padding:8px;
  margin:5px;
  border-radius:10px;
  max-width:75%;
}

.left{background:#202c33; margin-right:auto;}
.right{background:#25d366; color:black; margin-left:auto;}

/* FINAL */
.final{
  font-size:20px;
  text-align:center;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px #fff;}
  to{text-shadow:0 0 25px #ff69b4;}
}

h1, h2{
  font-family:'Playfair Display', serif;
  animation: glowText 2s ease-in-out infinite alternate;
  text-shadow: 0 0 10px #ff4d6d, 0 0 25px #ff006e;
}

#typing{
  font-family:'Great Vibes', cursive;
  font-size:20px;
  color:white;
  text-shadow: 0 0 15px #ff4d6d;
}

@keyframes glowText{
  from{ text-shadow: 0 0 5px #ff4d6d; }
  to{ text-shadow: 0 0 30px #ff006e; }
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="love1.mp3" type="audio/mpeg">
</audio>

<audio id="heartbeat" loop>
  <source src="heartbeat.mp3" type="audio/mpeg">
</audio>

<audio id="voice">
  <source src="voice.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->
<div id="s1" class="screen active">
<h2>💖 Somthing Special for you 💖</h2>
<button onclick="start()">Start</button>
</div>

<!-- PASSWORD -->
<div id="s2" class="screen">
<h2>🔐 Enter Secret Name</h2>
<input id="pass">
<button onclick="unlock()">Unlock</button>
</div>

<!-- LETTER -->
<div id="s3" class="screen">
<p id="letter"></p>
</div>

<!-- PHOTO -->
<div id="s4" class="screen">
<img src="img2.jpg" class="photo">
</div>

<!-- CHAT -->
<div id="s5" class="screen">
<div class="chat" id="chatBox"></div>
</div>

<!-- PROPOSAL SCREEN -->
<div id="s5b" class="screen">
  <h2>💍 Will you be mine forever?</h2>

  <button onclick="sayYes()">YES 💖</button>
  <button id="noBtn" onmouseover="runAway()">NO 😜</button>
</div>

<!-- FINAL -->
<div id="s6" class="screen">
<div class="final">💖 Maza Pandhrya Pedhyala Happiest Birthday 😚💋
       
I LOVE YOU FOREVER ♾️👩‍❤️‍💋‍👨💗 </div>
</div>

<script>

/* AUDIO */
const bgm = document.getElementById("bgm");
const heartbeat = document.getElementById("heartbeat");
const voice = document.getElementById("voice");

/* START */
function start(){

  bgm.volume = 0.5;
  heartbeat.volume = 0.4;

  bgm.play().catch(()=>{});

  setTimeout(()=>{
    heartbeat.play().catch(()=>{});
  },1000);

  next(1);
}

/* SCREEN SWITCH */
function next(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));

  if(n === 4){
    document.getElementById("s5").classList.add("active");
  }
  else if(n === 4.5){
    document.getElementById("s5b").classList.add("active");
  }
  else if(n === 5){
    document.getElementById("s6").classList.add("active");
  }
  else{
    document.getElementById("s"+(n+1)).classList.add("active");
  }
} 

/* PASSWORD */
function unlock(){
  let val = pass.value.toLowerCase().trim();

  if(val === "suruja"){
    startLetter();
  }
  else{
    alert("😂 Wrong Password!");
  }
}

/* LETTER */
let text = `💌Happiest Birthday to the man who feels like home.🫂🫶🏻
You are my comfort, my strength, and my favourite blessing. 🫀🥹
Every moment with you feels special, and every memory with you stays close to my heart.😚💋
May this year wrap you with success, love, and all the goodness you give to others.
Thank you for being "you" - irreplaceable, gentle, and mine.🤌🏻🫀♾️
I Love you endlessly.♾️😚💗`; 

let i=0;

function startLetter(){
  next(2);

  let el = document.getElementById("letter");

  function type(){
    if(i < text.length){
      el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
      i++;
      setTimeout(type,60);
    }else{
      setTimeout(showPhoto,2000);
    }
  }

  type();
}

/* PHOTO */
function showPhoto(){
  next(3);
  setTimeout(startChat,3000);
}

/* CHAT */
function startChat(){
  next(4);

  let msgs = [
    ["Hi Bala ❤️","left"],
    [" Hmm bola😏","right"],
    ["I Miss you 🥺And Love you Navroba 💋💗","left"],
    ["I love you 💗","right"],
    ["Stay Mine Forever 🫠😌💍","left"]
  ];

  let box = document.getElementById("chatBox");
  let i=0;

  let inter = setInterval(()=>{

    if(i >= msgs.length){
      clearInterval(inter);
      setTimeout(()=>{
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s5b").classList.add("active");
},2000);
      return;
    }

    let d = document.createElement("div");
    d.className = "msg " + msgs[i][1];
    d.innerText = msgs[i][0];

    box.appendChild(d);
    i++;

  },1200);
}

/* FINAL */
function finalScene(){
  next(5);

  voice.play().catch(()=>{});
}
function runAway(){
  let btn = document.getElementById("noBtn");

  btn.style.position = "absolute";

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 100);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

function sayYes(){
  voice.play().catch(()=>{});

  // directly show final screen
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s6").classList.add("active");

  // go to FINAL SCREEN instead of replacing page
  setTimeout(()=>{
    next(5); // this will open s6
  },1000);

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:linear-gradient(-45deg,#ff0844,#ff69b4,#ff1493);
      color:white;
      text-align:center;
    ">
      <h1>💖 YEY HE SAID YES 😚</h1>
      <h2>I LOVE YOU FOREVER ♾️</h2>
      <h2> Maza Rasmalai Happiest Birthday 😚💋</h>
    </div>
  `;
}
</script>

</body>
</html>
